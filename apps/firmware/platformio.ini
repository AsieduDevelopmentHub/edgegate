[env:esp32-c3-supermini]
platform = espressif32@7.0.1
board = esp32-c3-devkitm-1
framework = arduino
board_build.sdkconfig_defaults = sdkconfig.defaults
monitor_speed = 115200
; ESP32-C3 SuperMini uses native USB CDC (not a USB-UART chip).
monitor_rts = 0
monitor_dtr = 0
build_flags =
    -I include
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DEDGEGATE_VERSION=\"1.0\"
    -DCORE_DEBUG_LEVEL=1
    -DEVENT_BUFFER_CAPACITY=64
    -DDNS_CACHE_SIZE=64
    -DCONFIG_LWIP_IP_FORWARD=1
    -DCONFIG_LWIP_IPV4_NAPT=1
    -DIP_FORWARD_ALLOW_TX_ON_RX_NETIF=1
    -DESP_LWIP=1
    -DLWIP_IPV4=1
    -DIP_FORWARD=1
    -DIP_NAPT=1
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/tools/sdk/esp32c3/include/lwip/port/esp32/include
lib_deps =
    bblanchon/ArduinoJson@^7.3.0
lib_ignore =
    DNSServer
test_framework = unity
test_build_src = yes

; Full AP internet sharing (NAT): rebuilds lwIP with IP forward + NAPT via pioarduino platform.
; First build downloads esp-idf and takes 15–30+ minutes. Then: pio run -e esp32-c3-supermini-napt -t upload
[env:esp32-c3-supermini-napt]
extends = env:esp32-c3-supermini
platform = espressif32
custom_sdkconfig =
    CONFIG_LWIP_IP_FORWARD=y
    CONFIG_LWIP_IPV4_NAPT=y
    CONFIG_LWIP_IP_FORWARD_ALLOW_TX_ON_RX_NETIF=y
    CONFIG_LWIP_IP_NAPT_MAX=512
build_flags =
    ${env:esp32-c3-supermini.build_flags}
    -DEDGEGATE_NAPT_LIB=1
build_src_filter =
    +<*>
    -<src/lwip/ip4_napt.c>

[platformio]
default_envs = esp32-c3-supermini
