name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: apps/backend
        run: pip install -e ".[dev]"
      - name: Lint
        working-directory: apps/backend
        run: ruff check app tests
      - name: Test
        working-directory: apps/backend
        run: pytest tests/ -v

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm install
      - name: Build dashboard
        run: npm run build:dashboard

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ hashFiles('apps/firmware/platformio.ini') }}
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build firmware
        working-directory: apps/firmware
        run: pio run
      - name: Run firmware unit tests
        working-directory: apps/firmware
        run: pio test -e esp32-c3-supermini || true

  integration:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose -f infra/docker/docker-compose.yml up -d --build
      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 5
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Integration smoke tests
        run: pip install httpx pytest && pytest tests/integration/ -v -m integration
