# ==========================================================
# EdgeGate Platform
# Container Orchestration (Docker Compose)
#
# Services:
# - PostgreSQL (Persistent Storage)
# - Redis (Caching / Queue Layer)
# - Backend API (FastAPI)
# - Dashboard (Next.js)
# - NGINX (Reverse Proxy)
#
# Usage:
#
# Start:
# docker compose up -d
#
# Stop:
# docker compose down
#
# Logs:
# docker compose logs -f
#
# Rebuild:
# docker compose up --build
# ==========================================================

version: "3.9"

services:

  # ========================================================
  # PostgreSQL
  # Primary relational datastore
  # ========================================================

  postgres:
    container_name: edgegate-postgres

    image: postgres:16-alpine

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

      - ../postgres/init.sql:
          /docker-entrypoint-initdb.d/01-init.sql:ro

    expose:
      - "5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]

      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    networks:
      - internal

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ========================================================
  # Redis
  # Cache / realtime state / queues
  # ========================================================

  redis:
    container_name: edgegate-redis

    image: redis:7-alpine

    restart: unless-stopped

    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--save",
        "60",
        "1000"
      ]

    expose:
      - "6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "ping"
        ]

      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - internal

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ========================================================
  # Backend API
  # FastAPI + Redis + PostgreSQL
  # ========================================================

  backend:
    container_name: edgegate-backend

    build:
      context: ../../apps/backend
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:

      DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

      REDIS_URL: redis://redis:6379/0

      SECRET_KEY: ${SECRET_KEY}

      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET}

      CORS_ORIGINS: ${CORS_ORIGINS}

      ENVIRONMENT: production

    expose:
      - "8000"

    depends_on:

      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://localhost:8000/health"
        ]

      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - internal

    logging:
      driver: json-file

      options:
        max-size: "20m"
        max-file: "5"

  # ========================================================
  # Dashboard
  # Next.js Frontend
  # ========================================================

  dashboard:
    container_name: edgegate-dashboard

    build:
      context: ../..
      dockerfile: apps/dashboard/Dockerfile

    restart: unless-stopped

    environment:

      NODE_ENV: production

      NEXT_PUBLIC_API_URL: /api

      NEXT_PUBLIC_WS_URL: /ws

    expose:
      - "3000"

    depends_on:

      backend:
        condition: service_healthy

    networks:
      - internal

    logging:
      driver: json-file

      options:
        max-size: "20m"
        max-file: "3"

  # ========================================================
  # NGINX
  # Reverse Proxy / Routing Layer
  # ========================================================

  nginx:
    container_name: edgegate-nginx

    image: nginx:alpine

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:
          /etc/nginx/conf.d/default.conf:ro

    depends_on:

      backend:
        condition: service_healthy

      dashboard:
        condition: service_started

    networks:
      - public
      - internal

    logging:
      driver: json-file

      options:
        max-size: "20m"
        max-file: "5"

# ==========================================================
# Persistent Volumes
# ==========================================================

volumes:

  postgres_data:
    name: edgegate_postgres_data

  redis_data:
    name: edgegate_redis_data

# ==========================================================
# Network Topology
#
# public
#   ↓
# nginx
#   ↓
# internal
#   ↓
# backend
#   ↓
# postgres + redis
# ==========================================================

networks:

  internal:
    name: edgegate_internal
    driver: bridge

  public:
    name: edgegate_public
    driver: bridge